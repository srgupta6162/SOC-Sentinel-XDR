<!DOCTYPE html>
<html>
<head>

<title>Upload Results - SOC Sentinel</title>

<style>

body{
    background:#020617;
    color:white;
    font-family:'Segoe UI',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{

    width:800px;

    background:
    linear-gradient(
        135deg,
        #0f172a,
        #1e293b
    );

    border:1px solid #334155;

    border-radius:20px;

    padding:40px;

    text-align:center;

    box-shadow:
    0 0 25px
    rgba(56,189,248,.15);
}

.success{

    font-size:70px;

    margin-bottom:15px;
}

h1{

    color:#22c55e;

    margin-bottom:25px;
}

.stats{

    display:grid;

    grid-template-columns:
    repeat(3,1fr);

    gap:20px;

    margin-top:30px;
}

.stat{

    background:#0f172a;

    border:1px solid #334155;

    border-radius:12px;

    padding:25px;
}

.stat h2{

    color:#38bdf8;

    font-size:35px;
}

.btn{

    display:inline-block;

    margin-top:30px;

    background:#38bdf8;

    color:black;

    text-decoration:none;

    padding:12px 25px;

    border-radius:10px;

    font-weight:bold;
}

.btn:hover{

    background:#0ea5e9;
}

</style>

</head>

<body>

<div class="card">

<div class="success">
✅
</div>

<h1>Upload Successful</h1>

<p>
SOC Sentinel processed uploaded logs successfully.
</p>

<div class="stats">

<div class="stat">
<h2>{{ files_processed }}</h2>
<p>Files Processed</p>
</div>

<div class="stat">
<h2>{{ events_parsed }}</h2>
<p>Events Parsed</p>
</div>

<div class="stat">
<h2>{{ alerts_generated }}</h2>
<p>Alerts Generated</p>
</div>

</div>

<a href="/" class="btn">
🏠 Return Dashboard
</a>

</div>

</body>
</html>
